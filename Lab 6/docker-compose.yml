version: "3.9"

# ── Lab 6: Resilient Internet + Secure Microservices ─────────────────────────
# Networks: internet_net | isp_net | lan_a_net | lan_b_net
# Routers:  R1 (NAT edge + OSPF + IP SLA) | R2 (branch + OSPF)
# Servers:  ServerA (LAN A) | ServerB (LAN B)
# Clients:  ClientA (LAN A) | ClientB (LAN B)

networks:
  internet_net:
    driver: bridge
    ipam:
      config:
        - subnet: 10.255.0.0/24

  isp_net:
    driver: bridge
    ipam:
      config:
        - subnet: 100.10.10.0/30

  lan_a_net:
    driver: bridge
    ipam:
      config:
        - subnet: 192.168.10.0/24

  lan_b_net:
    driver: bridge
    ipam:
      config:
        - subnet: 192.168.20.0/24

services:

  # ── R1: Internet Edge Router ───────────────────────────────────────────────
  R1:
    image: frrouting/frr:latest
    container_name: R1
    hostname: R1
    privileged: true
    cap_add:
      - NET_ADMIN
      - SYS_ADMIN
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.forwarding=1
    networks:
      internet_net:
        ipv4_address: 10.255.0.2
      isp_net:
        ipv4_address: 100.10.10.1
      lan_a_net:
        ipv4_address: 192.168.10.1
    volumes:
      - ./config/r1/frr.conf:/etc/frr/frr.conf:ro
      - ./config/r1/daemons:/etc/frr/daemons:ro
      - ./scripts/r1_firewall.sh:/startup/firewall.sh:ro
    entrypoint: >
      sh -c "
        /usr/lib/frr/frrinit.sh start &&
        sleep 3 &&
        sh /startup/firewall.sh &&
        tail -f /dev/null
      "

  # ── R2: Branch Router ─────────────────────────────────────────────────────
  R2:
    image: frrouting/frr:latest
    container_name: R2
    hostname: R2
    privileged: true
    cap_add:
      - NET_ADMIN
      - SYS_ADMIN
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.forwarding=1
    networks:
      isp_net:
        ipv4_address: 100.10.10.2
      lan_b_net:
        ipv4_address: 192.168.20.1
    volumes:
      - ./config/r2/frr.conf:/etc/frr/frr.conf:ro
      - ./config/r2/daemons:/etc/frr/daemons:ro
    entrypoint: >
      sh -c "
        /usr/lib/frr/frrinit.sh start &&
        tail -f /dev/null
      "
    depends_on:
      - R1

  # ── ServerA: Microservices on LAN A ───────────────────────────────────────
  ServerA:
    image: python:3.10-alpine
    container_name: ServerA
    hostname: ServerA
    networks:
      lan_a_net:
        ipv4_address: 192.168.10.10
    environment:
      - UPLOAD_PORT=8000
      - PROCESSING_PORT=8001
      - AI_PORT=8002
      - GATEWAY_PORT=9000
      - UPLOAD_SERVICE_URL=http://localhost:8000
      - PROCESSING_SERVICE_URL=http://localhost:8001
      - AI_SERVICE_URL=http://localhost:8002
      - ALLOWED_ORIGINS=*
      - FRR_ENABLED=false
    volumes:
      - ./automation:/automation
    working_dir: /automation
    command: >
      sh -c "
        pip install fastapi uvicorn httpx aiofiles pydantic python-dotenv slowapi --quiet &&
        python start_services.py
      "
    depends_on:
      - R1
      - R2

  # ── ServerB: Microservices on LAN B ───────────────────────────────────────
  ServerB:
    image: python:3.10-alpine
    container_name: ServerB
    hostname: ServerB
    networks:
      lan_b_net:
        ipv4_address: 192.168.20.10
    environment:
      - UPLOAD_PORT=8000
      - PROCESSING_PORT=8001
      - AI_PORT=8002
      - GATEWAY_PORT=9000
      - UPLOAD_SERVICE_URL=http://localhost:8000
      - PROCESSING_SERVICE_URL=http://localhost:8001
      - AI_SERVICE_URL=http://localhost:8002
      - ALLOWED_ORIGINS=*
      - FRR_ENABLED=false
    volumes:
      - ./automation:/automation
    working_dir: /automation
    command: >
      sh -c "
        pip install fastapi uvicorn httpx aiofiles pydantic python-dotenv slowapi --quiet &&
        python start_services.py
      "
    depends_on:
      - R1
      - R2

  # ── ClientA: Test client on LAN A ─────────────────────────────────────────
  ClientA:
    image: python:3.10-alpine
    container_name: ClientA
    hostname: ClientA
    networks:
      lan_a_net:
        ipv4_address: 192.168.10.50
    command: tail -f /dev/null
    depends_on:
      - ServerA

  # ── ClientB: Test client on LAN B ─────────────────────────────────────────
  ClientB:
    image: python:3.10-alpine
    container_name: ClientB
    hostname: ClientB
    networks:
      lan_b_net:
        ipv4_address: 192.168.20.50
    command: tail -f /dev/null
    depends_on:
      - ServerB
