! ══════════════════════════════════════════════════════
! R1 — FRRouting config
! Role: Internet Edge Router
! Lab 6: OSPF Area 0 + default-information originate
! ══════════════════════════════════════════════════════

frr version 8.5
frr defaults traditional
hostname R1
log syslog informational
service integrated-vtysh-config

! ── Interfaces ──────────────────────────────────────
interface eth0
 description Internet (NAT outside)
 ip address 10.255.0.2/24

interface eth1
 description ISP WAN to R2
 ip address 100.10.10.1/30

interface eth2
 description LAN A inside
 ip address 192.168.10.1/24

! ── Static default route (tracked by IP SLA via shell) ──
ip route 0.0.0.0/0 10.255.0.1

! ── OSPF ────────────────────────────────────────────
router ospf
 ospf router-id 1.1.1.1
 !
 ! Advertise ISP link and LAN A into OSPF Area 0
 network 100.10.10.0/30 area 0
 network 192.168.10.0/24 area 0
 !
 ! Don't send OSPF hellos out the LAN-facing interface
 passive-interface eth2
 !
 ! Inject default route into OSPF so R2 learns it automatically
 default-information originate

! ── Logging ─────────────────────────────────────────
log timestamp precision 3

line vty

end
