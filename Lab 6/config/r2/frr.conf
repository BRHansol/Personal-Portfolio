! ══════════════════════════════════════════════════════
! R2 — FRRouting config
! Role: Branch Router
! Lab 6: OSPF Area 0, learns default route from R1
! ══════════════════════════════════════════════════════

frr version 8.5
frr defaults traditional
hostname R2
log syslog informational
service integrated-vtysh-config

! ── Interfaces ──────────────────────────────────────
interface eth0
 description ISP WAN to R1
 ip address 100.10.10.2/30

interface eth1
 description LAN B inside
 ip address 192.168.20.1/24

! ── OSPF ────────────────────────────────────────────
router ospf
 ospf router-id 2.2.2.2
 !
 ! Advertise ISP link and LAN B into OSPF Area 0
 network 100.10.10.0/30 area 0
 network 192.168.20.0/24 area 0
 !
 ! Don't send OSPF hellos out the LAN-facing interface
 passive-interface eth1
 !
 ! R2 does NOT originate default — it learns it from R1

! ── Logging ─────────────────────────────────────────
log timestamp precision 3

line vty

end
