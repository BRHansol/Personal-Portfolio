! ══════════════════════════════════════════════════════
! R3 — Lab 7: Standby Edge Router
! HSRP Standby | ISP 2 | OSPF | VPN endpoint
! ══════════════════════════════════════════════════════
frr version 8.5
frr defaults traditional
hostname R3
log syslog informational
service integrated-vtysh-config

interface eth0
 description Internet ISP 2
 ip address 10.255.0.3/24

interface eth1
 description HSRP peering + VPN tunnel to R1
 ip address 10.0.0.2/29

interface eth2
 description ISP WAN (backup path)
 ip address 100.10.10.3/30

interface eth3
 description DMZ
 ip address 172.16.0.2/24

! Backup default via ISP 2 (higher metric = only used when R1 down)
ip route 0.0.0.0/0 10.255.0.1 10

router ospf
 ospf router-id 3.3.3.3
 network 100.10.10.0/30 area 0
 network 172.16.0.0/24 area 0
 passive-interface eth3
 default-information originate always

log timestamp precision 3
line vty
end
