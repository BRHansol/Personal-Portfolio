! ══════════════════════════════════════════════════════
! R1 — Lab 7: Primary Edge Router
! HSRP Active | ISP 1 | OSPF | VPN endpoint
! ══════════════════════════════════════════════════════
frr version 8.5
frr defaults traditional
hostname R1
log syslog informational
service integrated-vtysh-config

interface eth0
 description Internet ISP 1
 ip address 10.255.0.2/24

interface eth1
 description HSRP peering + VPN tunnel to R3
 ip address 10.0.0.1/29

interface eth2
 description ISP WAN to R2
 ip address 100.10.10.1/30

interface eth3
 description LAN A inside
 ip address 192.168.10.1/24

interface eth4
 description DMZ
 ip address 172.16.0.1/24

! Static default via ISP 1 (tracked by IP SLA shell)
ip route 0.0.0.0/0 10.255.0.1

! Route to R3 HSRP peer
ip route 10.0.0.2/32 10.0.0.2

router ospf
 ospf router-id 1.1.1.1
 network 100.10.10.0/30 area 0
 network 192.168.10.0/24 area 0
 network 172.16.0.0/24 area 0
 passive-interface eth3
 passive-interface eth4
 default-information originate

log timestamp precision 3
line vty
end
