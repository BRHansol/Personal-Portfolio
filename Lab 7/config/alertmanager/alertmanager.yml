global:
  resolve_timeout: 5m

route:
  group_by: [alertname, severity]
  group_wait:      10s
  group_interval:  5m
  repeat_interval: 1h
  receiver: lab7-default

  routes:
    - match:
        severity: critical
      receiver: lab7-critical
      continue: false

receivers:
  - name: lab7-default
    webhook_configs:
      - url: http://localhost:5001/alerts
        send_resolved: true

  - name: lab7-critical
    webhook_configs:
      - url: http://localhost:5001/critical
        send_resolved: true

inhibit_rules:
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal: [alertname, instance]
