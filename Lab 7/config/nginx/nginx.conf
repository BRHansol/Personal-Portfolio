# ══════════════════════════════════════════════════════════════════
# nginx Load Balancer — Lab 7 DMZ
# Distributes traffic across ServerA and ServerB
# ══════════════════════════════════════════════════════════════════

events {
    worker_connections 1024;
}

http {
    # ── Logging with request ID ────────────────────────────────────
    log_format main '$remote_addr [$time_local] "$request" $status '
                    '$body_bytes_sent req_id=$http_x_request_id '
                    'upstream=$upstream_addr rt=$request_time';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # ── Upstream: Gateway service (port 9000) ──────────────────────
    upstream gateway_pool {
        least_conn;
        server 192.168.10.10:9000 weight=1 max_fails=3 fail_timeout=10s;
        server 192.168.20.10:9000 weight=1 max_fails=3 fail_timeout=10s;
        keepalive 16;
    }

    # ── Upstream: Upload service (port 8000) ───────────────────────
    upstream upload_pool {
        least_conn;
        server 192.168.10.10:8000 weight=1 max_fails=3 fail_timeout=10s;
        server 192.168.20.10:8000 weight=1 max_fails=3 fail_timeout=10s;
    }

    # ── Main server block ──────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # Inject request ID if not present
        set $req_id $http_x_request_id;
        if ($req_id = "") {
            set $req_id $request_id;
        }

        # ── Health check endpoint (nginx itself) ───────────────────
        location /nginx-health {
            access_log off;
            return 200 '{"status":"healthy","service":"load-balancer"}';
            add_header Content-Type application/json;
        }

        # ── Gateway API (all /process-file, /health, /stats) ───────
        location / {
            proxy_pass         http://gateway_pool;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Request-ID      $req_id;
            proxy_read_timeout 60s;
            proxy_connect_timeout 5s;

            add_header X-Request-ID  $req_id always;
            add_header X-Served-By   $upstream_addr always;
        }

        # ── Upload-only endpoint ────────────────────────────────────
        location /upload {
            client_max_body_size 15m;
            proxy_pass           http://upload_pool;
            proxy_set_header     X-Request-ID $req_id;
            proxy_read_timeout   30s;
        }
    }
}
