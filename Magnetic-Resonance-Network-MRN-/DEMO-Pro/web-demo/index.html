<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MRN Web Demo</title>
  <style>
    :root {
      --bg: #0d1117;
      --panel: #161b22;
      --line: #30363d;
      --text: #e6edf3;
      --muted: #9da7b3;
      --ok: #3fb950;
      --warn: #d29922;
      --bad: #f85149;
      --accent: #58a6ff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    .wrap {
      width: min(1100px, 95vw);
      margin: 24px auto;
      display: grid;
      gap: 16px;
    }
    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 14px;
    }
    h1 { margin: 0 0 8px; font-size: 1.3rem; }
    p { margin: 0; color: var(--muted); line-height: 1.5; }
    .row {
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      gap: 10px;
      align-items: end;
    }
    .f { grid-column: span 2; }
    .f.wide { grid-column: span 4; }
    label {
      display: block;
      color: var(--muted);
      font-size: 0.86rem;
      margin-bottom: 6px;
    }
    input, select, button {
      width: 100%;
      background: #0b1220;
      color: var(--text);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 8px 10px;
      font: inherit;
    }
    button {
      background: #132238;
      border-color: #284364;
      cursor: pointer;
    }
    button:hover { background: #183057; }
    .btn-danger {
      background: #311018;
      border-color: #5d1b29;
    }
    .btn-danger:hover { background: #43121d; }
    .status {
      margin-top: 10px;
      font-size: 0.92rem;
      color: var(--muted);
    }
    .node-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
      gap: 8px;
      margin-top: 10px;
    }
    .node-pill {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 8px 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.9rem;
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      display: inline-block;
      margin-right: 6px;
    }
    .up { background: var(--ok); }
    .down { background: var(--bad); }
    .canvas-box {
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #0b1220;
      margin-top: 12px;
    }
    svg { display: block; min-width: 700px; }
    .logs {
      max-height: 260px;
      overflow: auto;
      display: grid;
      gap: 6px;
    }
    .log {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 0.9rem;
      line-height: 1.4;
    }
    .ok { border-color: #2a5a32; background: #0f1f14; }
    .bad { border-color: #6a2d36; background: #221015; }
    .muted { color: var(--muted); }
    @media (max-width: 800px) {
      .f, .f.wide { grid-column: span 12; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="card">
      <h1>MRN Web Demo (เล่นบนเว็บ)</h1>
      <p>จำลองการส่งข้อความในเครือข่าย MRN แบบ multi-hop โดยอิงระยะทางและจำนวน hop สูงสุด คล้าย logic ในเดโมเทอร์มินัล</p>
    </section>

    <section class="card">
      <div class="row">
        <div class="f"><label for="maxDistance">max-hop-distance</label><input id="maxDistance" type="number" step="1" min="1" value="60" /></div>
        <div class="f"><label for="maxHops">max-hops</label><input id="maxHops" type="number" step="1" min="1" value="4" /></div>
        <div class="f"><label for="baseDelay">base delay (ms)</label><input id="baseDelay" type="number" step="1" min="0" value="5" /></div>
        <div class="f"><label for="distancePenalty">distance delay factor</label><input id="distancePenalty" type="number" step="0.1" min="0" value="3.0" /></div>
        <div class="f"><label for="baseLoss">base loss (0-1)</label><input id="baseLoss" type="number" step="0.001" min="0" max="1" value="0" /></div>
        <div class="f"><label for="lossAtMax">loss-at-max (0-1)</label><input id="lossAtMax" type="number" step="0.001" min="0" max="1" value="0.005" /></div>
      </div>
      <div class="status" id="configStatus"></div>
    </section>

    <section class="card">
      <div class="row">
        <div class="f"><label for="src">จาก (src)</label><select id="src"></select></div>
        <div class="f"><label for="dst">ไปหา (dst)</label><select id="dst"></select></div>
        <div class="f wide"><label for="payload">ข้อความ</label><input id="payload" type="text" value="hello from N12" /></div>
        <div class="f"><label>&nbsp;</label><button id="sendBtn">ส่งข้อความ</button></div>
        <div class="f"><label>&nbsp;</label><button id="resetBtn" class="btn-danger">รีเซ็ต Log</button></div>
      </div>

      <div class="node-grid" id="nodeGrid"></div>

      <div class="canvas-box">
        <svg id="topology" width="980" height="240" viewBox="0 0 980 240" aria-label="MRN Topology"></svg>
      </div>
    </section>

    <section class="card">
      <h1 style="font-size: 1rem; margin-bottom: 10px;">Event Log</h1>
      <div id="logs" class="logs"></div>
    </section>
  </div>

  <script>
    const nodes = [
      { name: "N12", pos: [0, 0], up: true },
      { name: "N34", pos: [50, 0], up: true },
      { name: "N36", pos: [100, 0], up: true },
      { name: "N58", pos: [150, 0], up: true }
    ];

    const el = {
      maxDistance: document.getElementById("maxDistance"),
      maxHops: document.getElementById("maxHops"),
      baseDelay: document.getElementById("baseDelay"),
      distancePenalty: document.getElementById("distancePenalty"),
      baseLoss: document.getElementById("baseLoss"),
      lossAtMax: document.getElementById("lossAtMax"),
      src: document.getElementById("src"),
      dst: document.getElementById("dst"),
      payload: document.getElementById("payload"),
      sendBtn: document.getElementById("sendBtn"),
      resetBtn: document.getElementById("resetBtn"),
      logs: document.getElementById("logs"),
      nodeGrid: document.getElementById("nodeGrid"),
      topology: document.getElementById("topology"),
      configStatus: document.getElementById("configStatus")
    };

    function dist(a, b) {
      const dx = a[0] - b[0];
      const dy = a[1] - b[1];
      return Math.sqrt(dx * dx + dy * dy);
    }

    function getConfig() {
      return {
        maxDistance: Number(el.maxDistance.value),
        maxHops: Number(el.maxHops.value),
        baseDelay: Number(el.baseDelay.value),
        distancePenalty: Number(el.distancePenalty.value),
        baseLoss: Number(el.baseLoss.value),
        lossAtMax: Number(el.lossAtMax.value)
      };
    }

    function onlineNodes() {
      return nodes.filter((n) => n.up);
    }

    function computeAutoPath(src, dst, cfg) {
      const map = new Map(onlineNodes().map((n) => [n.name, n]));
      if (!map.has(src) || !map.has(dst)) return null;
      if (src === dst) return [src];

      const adj = {};
      for (const a of map.values()) {
        adj[a.name] = [];
        for (const b of map.values()) {
          if (a.name === b.name) continue;
          if (dist(a.pos, b.pos) <= cfg.maxDistance) {
            adj[a.name].push(b.name);
          }
        }
      }

      const q = [[src]];
      const seen = new Set([src]);
      while (q.length) {
        const p = q.shift();
        if (p.length - 1 > cfg.maxHops) continue;
        const last = p[p.length - 1];
        if (last === dst) return p;
        for (const nb of adj[last] || []) {
          if (seen.has(nb)) continue;
          seen.add(nb);
          q.push([...p, nb]);
        }
      }
      return null;
    }

    function simulatePath(path, cfg) {
      let totalDelay = 0;
      let dropped = false;
      const hops = [];

      for (let i = 0; i < path.length - 1; i++) {
        const a = nodes.find((n) => n.name === path[i]);
        const b = nodes.find((n) => n.name === path[i + 1]);
        const d = dist(a.pos, b.pos);
        const ratio = Math.min(3, Math.max(0, d / cfg.maxDistance));
        const extraDelay = cfg.distancePenalty * (ratio * ratio) * cfg.maxDistance;
        const hopDelay = cfg.baseDelay + extraDelay;
        const loss = Math.min(0.95, Math.max(0, cfg.baseLoss + (ratio * ratio) * cfg.lossAtMax));
        const hit = Math.random() < loss;
        hops.push({ from: a.name, to: b.name, d, hopDelay, loss, hit });
        totalDelay += hopDelay;
        if (hit) {
          dropped = true;
          break;
        }
      }
      return { dropped, totalDelay, hops };
    }

    function logLine(text, good = true) {
      const div = document.createElement("div");
      div.className = "log " + (good ? "ok" : "bad");
      div.innerHTML = text;
      el.logs.prepend(div);
    }

    function repopulateSelects() {
      const options = nodes.map((n) => `<option value="${n.name}">${n.name}</option>`).join("");
      el.src.innerHTML = options;
      el.dst.innerHTML = options;
      el.src.value = "N12";
      el.dst.value = "N58";
    }

    function renderNodes() {
      el.nodeGrid.innerHTML = "";
      for (const n of nodes) {
        const box = document.createElement("div");
        box.className = "node-pill";
        box.innerHTML = `
          <span><span class="dot ${n.up ? "up" : "down"}"></span>${n.name}</span>
          <button data-node="${n.name}" style="width:auto;padding:4px 8px;font-size:0.78rem;">
            ${n.up ? "ปิดโหนด" : "เปิดโหนด"}
          </button>
        `;
        box.querySelector("button").addEventListener("click", () => {
          n.up = !n.up;
          renderNodes();
          renderTopology();
        });
        el.nodeGrid.appendChild(box);
      }
    }

    function mapX(posX) {
      const min = 0;
      const max = 150;
      const pad = 90;
      return pad + ((posX - min) / (max - min)) * (980 - pad * 2);
    }

    function renderTopology() {
      const cfg = getConfig();
      const svg = el.topology;
      const lines = [];
      const dots = [];

      for (let i = 0; i < nodes.length; i++) {
        for (let j = i + 1; j < nodes.length; j++) {
          const a = nodes[i];
          const b = nodes[j];
          if (!a.up || !b.up) continue;
          const d = dist(a.pos, b.pos);
          if (d <= cfg.maxDistance) {
            lines.push(`
              <line x1="${mapX(a.pos[0])}" y1="120" x2="${mapX(b.pos[0])}" y2="120"
                    stroke="#31506e" stroke-width="2" stroke-dasharray="5 4"></line>
            `);
          }
        }
      }

      for (const n of nodes) {
        const x = mapX(n.pos[0]);
        const fill = n.up ? "#2ea043" : "#f85149";
        dots.push(`
          <circle cx="${x}" cy="120" r="18" fill="${fill}"></circle>
          <text x="${x}" y="125" text-anchor="middle" font-size="11" fill="#fff">${n.name}</text>
          <text x="${x}" y="155" text-anchor="middle" font-size="11" fill="#9da7b3">x=${n.pos[0]}</text>
        `);
      }

      svg.innerHTML = `
        <rect x="0" y="0" width="980" height="240" fill="#0b1220"></rect>
        ${lines.join("")}
        ${dots.join("")}
      `;

      el.configStatus.textContent =
        `online=${onlineNodes().length}/${nodes.length}, max-hop-distance=${cfg.maxDistance}, max-hops=${cfg.maxHops}`;
    }

    function sendMessage() {
      const cfg = getConfig();
      const src = el.src.value;
      const dst = el.dst.value;
      const payload = (el.payload.value || "").trim();
      if (!payload) {
        logLine("<b>[ERROR]</b> กรุณาใส่ข้อความ", false);
        return;
      }
      if (src === dst) {
        logLine(`<b>[RECV]</b> ${src} -> ${dst} | via ${src} | age 0ms | ${payload}`, true);
        return;
      }

      const path = computeAutoPath(src, dst, cfg);
      if (!path) {
        logLine(`<b>[DROP]</b> ไม่พบเส้นทางจาก ${src} ไป ${dst} (อาจต้องเพิ่ม max-hop-distance หรือเปิดโหนดกลาง)`, false);
        return;
      }

      const sim = simulatePath(path, cfg);
      const route = path.join(" -> MRN -> ");
      const hopMeta = sim.hops.map((h) =>
        `${h.from}->${h.to} d=${h.d.toFixed(1)} delay=${h.hopDelay.toFixed(1)}ms loss=${(h.loss * 100).toFixed(2)}%`
      ).join(" | ");

      if (sim.dropped) {
        const badHop = sim.hops.find((h) => h.hit);
        logLine(
          `<b>[DROP]</b> ${src} -> ${dst} | via ${route}<br>` +
          `<span class="muted">ตกหล่นที่ hop ${badHop.from} -> ${badHop.to} | ${hopMeta}</span>`,
          false
        );
        return;
      }

      logLine(
        `<b>[RECV]</b> ${src} -> ${dst} | via ${route} | age ${sim.totalDelay.toFixed(1)}ms | ${payload}<br>` +
        `<span class="muted">${hopMeta}</span>`,
        true
      );
    }

    function bind() {
      repopulateSelects();
      renderNodes();
      renderTopology();
      el.sendBtn.addEventListener("click", sendMessage);
      el.resetBtn.addEventListener("click", () => { el.logs.innerHTML = ""; });
      ["maxDistance", "maxHops", "baseDelay", "distancePenalty", "baseLoss", "lossAtMax"].forEach((k) => {
        el[k].addEventListener("input", renderTopology);
      });
    }

    bind();
  </script>
</body>
</html>
